
<!DOCTYPE html>
<html>
<head>
  <title>Your Cart - QuickShop</title>
  <link rel="stylesheet" href="cart.css">
</head>
<body>

<header>
  <h2>🛍 ShopEasy</h2>
  <a href="index.html" style="color:white;">⬅ Back to Shop</a>
</header>

<div class="cart-wrapper">

  <div class="cart-left">
    <h2>Shopping Cart</h2>
    <div id="cartContainer"></div>
  </div>

  <div class="cart-right">
    <h3>Subtotal (<span id="totalItems">0</span> items)</h3>
    <h2>₹<span id="cartTotal">0</span></h2>
    <button id="checkoutBtn">Proceed to Buy</button>
  </div>

</div>

<script src="cart.js"></script>
</body>
</html>
