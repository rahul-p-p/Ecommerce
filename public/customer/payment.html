<link rel="stylesheet" href="css/common.css">

<style>
/* ================= PAYMENT PAGE ================= */

body {
  background: #eaeded;
  font-family: "Segoe UI", sans-serif;
}

/* HEADER FIX */
.navbar {
  background: #131921;
  color: white;
  padding: 12px 20px;
}

.navbar h2 {
  margin: 0;
  font-size: 20px;
}

/* PAYMENT BOX */
.payment-box {
  max-width: 420px;
  margin: 60px auto;
  background: white;
  padding: 25px 22px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  animation: fadeIn 0.4s ease;
}

/* TITLE */
.payment-box h3 {
  margin-bottom: 15px;
  font-size: 18px;
  color: #111827;
}

/* SELECT */
.payment-box select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  margin-bottom: 15px;
  font-size: 14px;
  outline: none;
}

/* INPUTS */
.payment-box input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  font-size: 14px;
  outline: none;
}

/* FOCUS EFFECT */
.payment-box input:focus,
.payment-box select:focus {
  border-color: #6366f1;
  box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
}

/* BUTTON */
.payment-box button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: 0.25s;
}

.payment-box button:hover {
  background: #4338ca;
}

/* SMALL TEXT */
#paymentDetails p {
  font-size: 13px;
  color: #555;
  margin: 10px 0;
}

/* ANIMATION */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* MOBILE */
@media (max-width: 500px) {
  .payment-box {
    margin: 30px 15px;
    padding: 20px;
  }
}
</style>

<body>
  <header class="navbar">
    <h2>💳 Payment</h2>
  </header>

  <div class="payment-box">
    <h3>Select Payment Method</h3>

    <select id="paymentMethod">
      <option value="card">Credit / Debit Card</option>
      <option value="upi">UPI</option>
      <option value="cod">Cash on Delivery</option>
    </select>

    <div id="paymentDetails"></div>

    <button onclick="processPayment()">Pay Now</button>
  </div>

  <script src="js/payment.js"></script>
</body>
